name: Saramin ETL (매일 오전)

on:
  schedule:
    # UTC 00:00 = KST 09:00 (매일 오전 9시)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      published_days:
        description: '수집 범위 (일). 백필 시 30 입력'
        required: false
        default: '7'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Saramin ETL
        env:
          SARAMIN_API_KEY: ${{ secrets.SARAMIN_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SARAMIN_PUBLISHED_DAYS: ${{ inputs.published_days || '7' }}
        run: python -u saramin_etl.py
